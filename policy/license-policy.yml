version: 1

internal_groups:
  - sollecitom

waiver_policy:
  repo_policy_file: license-waivers.yml
  allow_repo_override_of_denied: false

allow:
  - Apache-2.0
  - MIT
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Python-2.0
  - Zlib
  - Unlicense
  - CC0-1.0
  - BSL-1.0

review:
  - MPL-2.0
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - CDDL-1.0
  - CDDL-1.1
  - EPL-1.0
  - EPL-2.0
  - Unicode-DFS-2016

deny:
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - SSPL-1.0
  - Commons-Clause

aliases:
  Apache 2.0: Apache-2.0
  Apache License, Version 2.0: Apache-2.0
  The Apache License, Version 2.0: Apache-2.0
  The Apache Software License, Version 2.0: Apache-2.0
  MIT License: MIT
  The MIT License: MIT
  BSD New license: BSD-3-Clause
  BSD 2-Clause License: BSD-2-Clause
  BSD 3-Clause License: BSD-3-Clause
  ISC License: ISC
  zlib License: Zlib

package_overrides:
  - package: pkg:maven/com.google.cloud.tools/jib-gradle-plugin@3.5.3
    license: Apache-2.0
    reason: Published plugin POM on plugins.gradle.org omits license metadata; upstream project is Apache-2.0.
