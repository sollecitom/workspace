version: 1

internal_groups:
  - sollecitom

waiver_policy:
  repo_policy_file: license-waivers.yml
  allow_repo_override_of_denied: false

allow:
  - Apache-2.0
  - MIT
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Python-2.0
  - Zlib
  - Unlicense
  - CC0-1.0
  - BSL-1.0
  - EDL-1.0
  - LicenseRef-Bouncy-Castle

review:
  - MPL-2.0
  - EPL-1.0
  - EPL-2.0
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - CDDL-1.0
  - CDDL-1.1
  - Unicode-DFS-2016
  - GPL-2.0-with-classpath-exception-2.0
  - FSL-1.1-ALv2
  - LicenseRef-CDDL-GPL
  - LicenseRef-CDDL-GPL-CE

deny:
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - SSPL-1.0
  - Commons-Clause

aliases:
  Apache 2.0: Apache-2.0
  Apache 2: Apache-2.0
  Apache License 2.0: Apache-2.0
  Apache License 2: Apache-2.0
  Apache License Version 2.0: Apache-2.0
  Apache License, Version 2.0: Apache-2.0
  The Apache License, Version 2.0: Apache-2.0
  Apache Software License, version 2.0: Apache-2.0
  The Apache Software License, Version 2.0: Apache-2.0
  MIT License: MIT
  The MIT License: MIT
  The MIT License (MIT): MIT
  BSD New license: BSD-3-Clause
  BSD 2-Clause License: BSD-2-Clause
  BSD 2-Clause "Simplified" License: BSD-2-Clause
  BSD 3-Clause License: BSD-3-Clause
  New BSD License: BSD-3-Clause
  ISC License: ISC
  CC0: CC0-1.0
  MIT-0: 0BSD
  Public Domain: CC0-1.0
  Public Domain, per Creative Commons CC0: CC0-1.0
  Eclipse Public License 1.0: EPL-1.0
  Eclipse Public License v2.0: EPL-2.0
  EPL 2.0: EPL-2.0
  EDL 1.0: EDL-1.0
  Eclipse Distribution License - v 1.0: EDL-1.0
  Mozilla Public License, Version 2.0: MPL-2.0
  Lesser General Public License, version 3 or greater: LGPL-3.0-or-later
  GPL2 w/ CPE: GPL-2.0-with-classpath-exception-2.0
  GPL-2.0-with-classpath-exception: GPL-2.0-with-classpath-exception-2.0
  CDDL+GPL License: LicenseRef-CDDL-GPL
  CDDL/GPLv2+CE: LicenseRef-CDDL-GPL-CE
  Bouncy Castle Licence: LicenseRef-Bouncy-Castle
  Bouncy Castle License: LicenseRef-Bouncy-Castle
  zlib License: Zlib

license_notes:
  MPL-2.0: "Ship the library unmodified, preserve the license text and notices, and do not copy MPL-covered source into our codebase."
  EPL-1.0: "Ship the library unmodified, preserve the license text and notices, and do not copy EPL-covered source into our codebase."
  EPL-2.0: "Ship the library unmodified, preserve the license text and notices, and do not copy EPL-covered source into our codebase."
  GPL-2.0-with-classpath-exception-2.0: "Use it only as an unmodified library dependency, preserve notices, and do not modify or republish the covered code outside the classpath-exception model."
  LicenseRef-CDDL-GPL-CE: "Be explicit about relying on the classpath-exception branch, preserve notices, and avoid modifying or republishing the covered code."
  LicenseRef-CDDL-GPL: "Treat this as a consciously approved dual-license dependency, preserve the license text and notices, do not modify or copy the covered source into our codebase, and be prepared to explain which licensing branch we are relying on."
  FSL-1.1-ALv2: "Require an explicit business/legal decision before shipping; this is not a standard permissive OSS license."

package_overrides:
  - package: pkg:maven/com.google.cloud.tools/jib-gradle-plugin@3.5.3
    license: Apache-2.0
    reason: Published plugin POM on plugins.gradle.org omits license metadata; upstream project is Apache-2.0.
  - package_prefix: pkg:maven/com.github.docker-java/
    license: Apache-2.0
    reason: docker-java published child POMs omit license blocks, but the upstream parent project is Apache-2.0.
  - package_prefix: pkg:maven/io.netty/
    license: Apache-2.0
    reason: Netty modules are Apache-2.0; some child artifacts omit direct license metadata.
  - package_prefix: pkg:maven/io.prometheus/
    license: Apache-2.0
    reason: Prometheus client_java modules are Apache-2.0; some child artifacts rely on incomplete parent metadata.
  - package_prefix: pkg:maven/net.bytebuddy/
    license: Apache-2.0
    reason: Byte Buddy artifacts are Apache-2.0; some published child POMs omit license metadata.
  - package_prefix: pkg:maven/org.apache.avro/
    license: Apache-2.0
    reason: Apache Avro artifacts are Apache-2.0; some published child POM chains do not expose license metadata cleanly.
  - package_prefix: pkg:maven/org.apache.james/
    license: Apache-2.0
    reason: Apache James artifacts are Apache-2.0; some child artifacts omit direct license metadata.
  - package_prefix: pkg:maven/org.apache.pulsar/
    license: Apache-2.0
    reason: Apache Pulsar artifacts are Apache-2.0; some child POMs do not expose license metadata through the resolver.
  - package_prefix: pkg:maven/org.jboss.resteasy/
    license: Apache-2.0
    reason: RESTEasy artifacts are Apache-2.0; some child POMs omit direct license blocks and rely on incomplete parent metadata.
  - package_prefix: pkg:maven/org.keycloak/
    license: Apache-2.0
    reason: Keycloak client artifacts are Apache-2.0; some child POMs omit direct license metadata.
  - package_prefix: pkg:maven/com.sun.xml.bind.external/
    license: EDL-1.0
    reason: JAXB external artifacts are published under the Eclipse Distribution License 1.0.
  - package_prefix: pkg:maven/jakarta.xml.bind/
    license: EDL-1.0
    reason: Jakarta XML Bind API artifacts inherit Eclipse Distribution License 1.0 from the published parent project.
  - package_prefix: pkg:maven/javax.xml.bind/jaxb-api@
    license: LicenseRef-CDDL-GPL
    reason: jaxb-api is published under the JAXB dual CDDL/GPL license family even though the child artifact omits a direct license block.
